<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign in — Morpheme</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/auth/styles.css">
</head>
<body>
  <!-- Demo disclaimer -->
  <div style="background:#FFFAEB;border-bottom:2px solid #F79009;padding:8px 16px;text-align:center;font-family:sans-serif;font-size:13px;color:#B54708;">
    ⚠️ UI demo only — no data is collected, stored, or transmitted.
  </div>

  <div class="auth-wrapper">

    <!-- Logo -->
    <a href="/auth/login" class="auth-logo" aria-label="Morpheme home">
      <span class="auth-logo-icon">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" aria-hidden="true">
          <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 10.5V6a3.75 3.75 0 1 0-7.5 0v4.5m11.356-1.993 1.263 12c.07.665-.45 1.243-1.119 1.243H4.25a1.125 1.125 0 0 1-1.12-1.243l1.264-12A1.125 1.125 0 0 1 5.513 7.5h12.974c.576 0 1.059.435 1.119 1.007ZM8.625 10.5a.375.375 0 1 1-.75 0 .375.375 0 0 1 .75 0Zm7.5 0a.375.375 0 1 1-.75 0 .375.375 0 0 1 .75 0Z" />
        </svg>
      </span>
      <span class="auth-logo-text">Morpheme</span>
    </a>

    <!-- Card -->
    <div class="auth-card">
      <div class="auth-card-header">
        <h1 class="auth-card-title">Welcome back</h1>
        <p class="auth-card-subtitle">Sign in to your account to continue</p>
      </div>

      <form action="#" method="post" novalidate>
        <!-- Email -->
        <div class="form-group">
          <label for="email" class="form-label">Email address</label>
          <input
            type="email"
            id="email"
            name="email"
            class="form-input"
            placeholder="you@example.com"
            autocomplete="email"
            required
          >
        </div>

        <!-- Password -->
        <div class="form-group">
          <label for="password" class="form-label">Password</label>
          <div class="input-password-wrapper">
            <input
              type="password"
              id="password"
              name="password"
              class="form-input"
              placeholder="Enter your password"
              autocomplete="current-password"
              required
            >
            <button type="button" class="input-password-toggle" aria-label="Show password" onclick="togglePassword('password', this)">
              <!-- Eye icon (show) -->
              <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" aria-hidden="true">
                <path stroke-linecap="round" stroke-linejoin="round" d="M2.036 12.322a1.012 1.012 0 0 1 0-.639C3.423 7.51 7.36 4.5 12 4.5c4.638 0 8.573 3.007 9.963 7.178.07.207.07.431 0 .639C20.577 16.49 16.64 19.5 12 19.5c-4.638 0-8.573-3.007-9.963-7.178Z" />
                <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 1 1-6 0 3 3 0 0 1 6 0Z" />
              </svg>
            </button>
          </div>
        </div>

        <!-- Remember me + Forgot password -->
        <div class="form-actions-row">
          <label class="form-checkbox">
            <input type="checkbox" id="remember" name="remember">
            <span class="form-checkbox-label">Remember me</span>
          </label>
          <a href="/auth/forgot-password">Forgot password?</a>
        </div>

        <!-- Submit -->
        <button type="submit" class="btn btn-primary btn-block">Sign in</button>
      </form>

      <!-- Divider -->
      <div class="divider-text">
        <span>or continue with</span>
      </div>

      <!-- Social buttons (generic — demo only) -->
      <div class="social-buttons">
        <button type="button" class="btn-social" aria-label="Sign in with SSO">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/>
          </svg>
          SSO
        </button>
        <button type="button" class="btn-social" aria-label="Sign in with developer account">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/>
          </svg>
          Developer
        </button>
      </div>
    </div>

    <!-- Footer link -->
    <p class="auth-footer">
      Don't have an account? <a href="/auth/register">Sign up</a>
    </p>

  </div>

  <script>
    function togglePassword(inputId, btn) {
      var input = document.getElementById(inputId);
      if (input.type === 'password') {
        input.type = 'text';
        btn.setAttribute('aria-label', 'Hide password');
      } else {
        input.type = 'password';
        btn.setAttribute('aria-label', 'Show password');
      }
    }
  </script>
</body>
</html>
