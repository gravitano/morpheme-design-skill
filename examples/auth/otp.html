<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Verify code — Morpheme</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/auth/styles.css">
</head>
<body>
  <div class="auth-wrapper">

    <!-- Logo -->
    <a href="login.html" class="auth-logo" aria-label="Morpheme home">
      <span class="auth-logo-icon">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" aria-hidden="true">
          <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 10.5V6a3.75 3.75 0 1 0-7.5 0v4.5m11.356-1.993 1.263 12c.07.665-.45 1.243-1.119 1.243H4.25a1.125 1.125 0 0 1-1.12-1.243l1.264-12A1.125 1.125 0 0 1 5.513 7.5h12.974c.576 0 1.059.435 1.119 1.007ZM8.625 10.5a.375.375 0 1 1-.75 0 .375.375 0 0 1 .75 0Zm7.5 0a.375.375 0 1 1-.75 0 .375.375 0 0 1 .75 0Z" />
        </svg>
      </span>
      <span class="auth-logo-text">Morpheme</span>
    </a>

    <!-- Card -->
    <div class="auth-card">
      <div class="auth-card-header">
        <!-- Shield / lock icon in circle -->
        <div class="auth-card-icon">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" aria-hidden="true">
            <path stroke-linecap="round" stroke-linejoin="round" d="M9 12.75 11.25 15 15 9.75m-3-7.036A11.959 11.959 0 0 1 3.598 6 11.99 11.99 0 0 0 3 9.749c0 5.592 3.824 10.29 9 11.623 5.176-1.332 9-6.03 9-11.622 0-1.31-.21-2.571-.598-3.751h-.152c-3.196 0-6.1-1.248-8.25-3.285Z" />
          </svg>
        </div>
        <h1 class="auth-card-title">Enter verification code</h1>
        <p class="auth-card-subtitle">We sent a 6-digit code to your email a]***@email.com</p>
      </div>

      <form action="#" method="post" novalidate>
        <!-- OTP inputs -->
        <fieldset style="border: none; padding: 0;">
          <legend class="sr-only">Enter 6-digit verification code</legend>
          <div class="otp-inputs">
            <label for="otp-1" class="sr-only">Digit 1</label>
            <input
              type="text"
              id="otp-1"
              name="otp_1"
              class="otp-input"
              maxlength="1"
              inputmode="numeric"
              pattern="[0-9]"
              autocomplete="one-time-code"
              placeholder="0"
              required
            >
            <label for="otp-2" class="sr-only">Digit 2</label>
            <input
              type="text"
              id="otp-2"
              name="otp_2"
              class="otp-input"
              maxlength="1"
              inputmode="numeric"
              pattern="[0-9]"
              placeholder="0"
              required
            >
            <label for="otp-3" class="sr-only">Digit 3</label>
            <input
              type="text"
              id="otp-3"
              name="otp_3"
              class="otp-input"
              maxlength="1"
              inputmode="numeric"
              pattern="[0-9]"
              placeholder="0"
              required
            >
            <label for="otp-4" class="sr-only">Digit 4</label>
            <input
              type="text"
              id="otp-4"
              name="otp_4"
              class="otp-input"
              maxlength="1"
              inputmode="numeric"
              pattern="[0-9]"
              placeholder="0"
              required
            >
            <label for="otp-5" class="sr-only">Digit 5</label>
            <input
              type="text"
              id="otp-5"
              name="otp_5"
              class="otp-input"
              maxlength="1"
              inputmode="numeric"
              pattern="[0-9]"
              placeholder="0"
              required
            >
            <label for="otp-6" class="sr-only">Digit 6</label>
            <input
              type="text"
              id="otp-6"
              name="otp_6"
              class="otp-input"
              maxlength="1"
              inputmode="numeric"
              pattern="[0-9]"
              placeholder="0"
              required
            >
          </div>
        </fieldset>

        <!-- Submit -->
        <button type="submit" class="btn btn-primary btn-block">Verify</button>
      </form>

      <!-- Resend -->
      <p class="resend-text">
        Didn't receive code? <a href="#" id="resend-link">Resend</a>
      </p>
      <p class="resend-timer" id="resend-timer">Resend available in <strong>59s</strong></p>

      <!-- Back to login -->
      <div style="text-align: center;">
        <a href="login.html" class="auth-back-link">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" aria-hidden="true">
            <path stroke-linecap="round" stroke-linejoin="round" d="M10.5 19.5 3 12m0 0 7.5-7.5M3 12h18" />
          </svg>
          Back to sign in
        </a>
      </div>
    </div>

  </div>

  <script>
    // Auto-advance OTP inputs
    var otpInputs = document.querySelectorAll('.otp-input');
    otpInputs.forEach(function (input, index) {
      input.addEventListener('input', function () {
        // Allow only digits
        this.value = this.value.replace(/[^0-9]/g, '');
        if (this.value.length === 1 && index < otpInputs.length - 1) {
          otpInputs[index + 1].focus();
        }
      });
      input.addEventListener('keydown', function (e) {
        if (e.key === 'Backspace' && this.value === '' && index > 0) {
          otpInputs[index - 1].focus();
        }
      });
      // Handle paste
      input.addEventListener('paste', function (e) {
        e.preventDefault();
        var data = (e.clipboardData || window.clipboardData).getData('text').replace(/[^0-9]/g, '');
        for (var i = 0; i < data.length && i + index < otpInputs.length; i++) {
          otpInputs[index + i].value = data[i];
        }
        var nextIndex = Math.min(index + data.length, otpInputs.length - 1);
        otpInputs[nextIndex].focus();
      });
    });

    // Resend timer
    var countdown = 59;
    var timerEl = document.getElementById('resend-timer');
    var resendLink = document.getElementById('resend-link');
    var timerInterval = setInterval(function () {
      countdown--;
      if (countdown <= 0) {
        clearInterval(timerInterval);
        timerEl.style.display = 'none';
        resendLink.style.pointerEvents = 'auto';
        resendLink.style.opacity = '1';
      } else {
        timerEl.innerHTML = 'Resend available in <strong>' + countdown + 's</strong>';
      }
    }, 1000);
    // Disable resend link initially
    resendLink.style.pointerEvents = 'none';
    resendLink.style.opacity = '0.5';
  </script>
</body>
</html>
