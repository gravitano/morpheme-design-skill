<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Forgot password — Morpheme</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/auth/styles.css">
</head>
<body>
  <!-- Demo disclaimer -->
  <div style="background:#FFFAEB;border-bottom:2px solid #F79009;padding:8px 16px;text-align:center;font-family:sans-serif;font-size:13px;color:#B54708;">
    ⚠️ UI demo only — no data is collected, stored, or transmitted.
  </div>

  <div class="auth-wrapper">

    <!-- Logo -->
    <a href="/auth/login" class="auth-logo" aria-label="Morpheme home">
      <span class="auth-logo-icon">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" aria-hidden="true">
          <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 10.5V6a3.75 3.75 0 1 0-7.5 0v4.5m11.356-1.993 1.263 12c.07.665-.45 1.243-1.119 1.243H4.25a1.125 1.125 0 0 1-1.12-1.243l1.264-12A1.125 1.125 0 0 1 5.513 7.5h12.974c.576 0 1.059.435 1.119 1.007ZM8.625 10.5a.375.375 0 1 1-.75 0 .375.375 0 0 1 .75 0Zm7.5 0a.375.375 0 1 1-.75 0 .375.375 0 0 1 .75 0Z" />
        </svg>
      </span>
      <span class="auth-logo-text">Morpheme</span>
    </a>

    <!-- Card -->
    <div class="auth-card">
      <div class="auth-card-header">
        <!-- Mail icon in circle -->
        <div class="auth-card-icon">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" aria-hidden="true">
            <path stroke-linecap="round" stroke-linejoin="round" d="M21.75 6.75v10.5a2.25 2.25 0 0 1-2.25 2.25h-15a2.25 2.25 0 0 1-2.25-2.25V6.75m19.5 0A2.25 2.25 0 0 0 19.5 4.5h-15a2.25 2.25 0 0 0-2.25 2.25m19.5 0v.243a2.25 2.25 0 0 1-1.07 1.916l-7.5 4.615a2.25 2.25 0 0 1-2.36 0L3.32 8.91a2.25 2.25 0 0 1-1.07-1.916V6.75" />
          </svg>
        </div>
        <h1 class="auth-card-title">Forgot your password?</h1>
        <p class="auth-card-subtitle">Enter your email address and we'll send you a reset link.</p>
      </div>

      <form action="#" method="post" novalidate>
        <!-- Email -->
        <div class="form-group">
          <label for="email" class="form-label">Email address</label>
          <input
            type="email"
            id="email"
            name="email"
            class="form-input"
            placeholder="you@example.com"
            autocomplete="email"
            required
          >
        </div>

        <!-- Submit -->
        <button type="submit" class="btn btn-primary btn-block">Send reset link</button>
      </form>

      <!-- Back to login -->
      <div style="text-align: center;">
        <a href="/auth/login" class="auth-back-link">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" aria-hidden="true">
            <path stroke-linecap="round" stroke-linejoin="round" d="M10.5 19.5 3 12m0 0 7.5-7.5M3 12h18" />
          </svg>
          Back to sign in
        </a>
      </div>
    </div>

  </div>
</body>
</html>
